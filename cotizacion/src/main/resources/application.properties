spring.application.name=ms-cotizacion
server.port=8086

# Configuración de base de datos MySQL (Local)
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# URLs de microservicios locales
service.ms-cliente.url=http://localhost:8085
service.ms-auth.url=http://localhost:8081
service.ms-habitacion.url=http://localhost:8083
