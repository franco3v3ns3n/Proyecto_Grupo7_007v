services:
  mysql-hotel:
    image: mysql:8.0
    container_name: mysql-hotel
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: veranum_hotel
    ports:
      - "3307:3306"
    volumes:
      - mysql_hotel_data:/var/lib/mysql

  hotel:
    build:
      context: ./hotel
      dockerfile: dockerfile
    container_name: hotel
    restart: always
    depends_on:
      - mysql-hotel
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-hotel:3306/veranum_hotel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

  mysql-servicio:
    image: mysql:8.0
    container_name: mysql-servicio
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: veranum_servicio
    ports:
      - "3308:3306"
    volumes:
      - mysql_servicio_data:/var/lib/mysql

  servicio:
    build:
      context: ./servicio
      dockerfile: dockerfile
    container_name: servicio
    restart: always
    depends_on:
      - mysql-servicio
      - hotel
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-servicio:3306/veranum_servicio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      HOTEL_SERVICE_URL: http://hotel:8081

  mysql-evento:
    image: mysql:8.0
    container_name: mysql-evento
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: veranum_evento
    ports:
      - "3309:3306"
    volumes:
      - mysql_evento_data:/var/lib/mysql

  evento:
    build:
      context: ./evento
      dockerfile: dockerfile
    container_name: evento
    restart: always
    depends_on:
      - mysql-evento
      - hotel
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-evento:3306/veranum_evento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      HOTEL_SERVICE_URL: http://hotel:8081
  mysql-habitacion:
    image: mysql:8.0
    container_name: mysql-habitacion
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: veranum_habitacion
    ports:
      - "3310:3306"
    volumes:
      - mysql_habitacion_data:/var/lib/mysql

  habitacion:
    build:
      context: ./habitacion
      dockerfile: dockerfile
    container_name: habitacion
    restart: always
    depends_on:
      - mysql-habitacion
      - hotel
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-habitacion:3306/veranum_habitacion?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      HOTEL_SERVICE_URL: http://hotel:8081

  mysql-cliente:
    image: mysql:8.0
    container_name: mysql-cliente
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: veranum_cliente
    ports:
      - "3311:3306"
    volumes:
      - mysql_cliente_data:/var/lib/mysql

  cliente:
    build:
      context: ./cliente
      dockerfile: dockerfile
    container_name: cliente
    restart: always
    depends_on:
      - mysql-cliente
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-cliente:3306/veranum_cliente?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

  mysql-reserva:
    image: mysql:8.0
    container_name: mysql-reserva
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: veranum_reserva
    ports:
      - "3312:3306"
    volumes:
      - mysql_reserva_data:/var/lib/mysql

  reserva:
    build:
      context: ./reserva
      dockerfile: dockerfile
    container_name: reserva
    restart: always
    depends_on:
      - mysql-reserva
      - cliente
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reserva:3306/veranum_reserva?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      CLIENTE_SERVICE_URL: http://cliente:8085
      HABITACION_SERVICE_URL: http://habitacion:8084

volumes:
  mysql_hotel_data:
  mysql_servicio_data:
  mysql_evento_data:
  mysql_habitacion_data:
  mysql_cliente_data:
  mysql_reserva_data:
